name: Doc PR Checks

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main]

jobs:
  check-doc-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR is a doc PR
        id: validate
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Match [DOC] or [DOC #N] prefix
          if [[ ! "$TITLE" =~ ^\[DOC([[:space:]]+#[0-9]+)?\] ]]; then
            echo "Not a doc PR: $TITLE"
            exit 78  # Special exit code for skip
          fi
          echo "Doc PR validated: $TITLE"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract issue number
        id: extract-issue
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.title }}" | grep -oP '(?:#)\d+' | head -1 | tr -d '#')
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "Extracted issue number: $ISSUE_NUM"

      - name: Check PRD exists
        run: |
          ISSUE=${{ steps.extract-issue.outputs.issue_number }}
          if ls docs/prd/PRD-${ISSUE}_*.md 1>/dev/null 2>&1; then
            echo "PRD found for issue #${ISSUE}"
          else
            echo "PRD not found for issue #${ISSUE}"
            echo "Expected: docs/prd/PRD-${ISSUE}_v*.md"
            exit 1
          fi

      - name: Check Tech exists
        run: |
          ISSUE=${{ steps.extract-issue.outputs.issue_number }}
          if ls docs/tech/Tech-${ISSUE}_*.md 1>/dev/null 2>&1; then
            echo "Tech found for issue #${ISSUE}"
          else
            echo "Tech not found for issue #${ISSUE}"
            echo "Expected: docs/tech/Tech-${ISSUE}_v*.md"
            exit 1
          fi

      - name: Check QA exists
        run: |
          ISSUE=${{ steps.extract-issue.outputs.issue_number }}
          if ls docs/qa/QA-${ISSUE}_*.md 1>/dev/null 2>&1; then
            echo "QA found for issue #${ISSUE}"
          else
            echo "QA not found for issue #${ISSUE}"
            echo "Expected: docs/qa/QA-${ISSUE}_v*.md"
            exit 1
          fi

      - name: Check PR description contains all document links
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if echo "$BODY" | grep -q "PRD:" && \
             echo "$BODY" | grep -q "Tech:" && \
             echo "$BODY" | grep -q "QA:"; then
            echo "PR description contains all document links"
          else
            echo "PR description missing required document links"
            echo "Required: PRD:, Tech:, QA:"
            exit 1
          fi

      - name: Check Gate Status in Documents
        id: gate-check
        run: |
          ISSUE=${{ steps.extract-issue.outputs.issue_number }}

          echo ""
          echo "=========================================="
          echo "Gate Status Check"
          echo "=========================================="

          # Check PRD Gate 1
          PRD_FILE=$(ls docs/prd/PRD-${ISSUE}_*.md 2>/dev/null | head -1)
          if [ -n "$PRD_FILE" ]; then
            echo ""
            echo "[PRD Gate 1] Checking: $PRD_FILE"
            # Look for Gate block with required signatures
            if grep -q "Gate 1" "$PRD_FILE" || grep -q "PRD Gate" "$PRD_FILE"; then
              # Check for required sign-offs (PM, CTO, CSO/CRO)
              PM_SIG=$(grep -i "PM" "$PRD_FILE" | grep -i "sign" | head -1)
              CTO_SIG=$(grep -i "CTO" "$PRD_FILE" | head -1)
              CSO_SIG=$(grep -i "CSO\|CRO" "$PRD_FILE" | head -1)
              if [ -n "$PM_SIG" ] && [ -n "$CTO_SIG" ]; then
                echo "  [PRD Gate 1] Signatures: PM=present, CTO=present, CSO/CRO=${CSO_SIG:+present}"
              else
                echo "  [PRD Gate 1] WARNING: Missing required signatures"
              fi
            else
              echo "  [PRD Gate 1] No Gate block found - document may not be ready for merge"
              exit 1
            fi
          fi

          # Check Tech Gate 2
          TECH_FILE=$(ls docs/tech/Tech-${ISSUE}_*.md 2>/dev/null | head -1)
          if [ -n "$TECH_FILE" ]; then
            echo ""
            echo "[Tech Gate 2] Checking: $TECH_FILE"
            if grep -q "Gate 2\|Tech Gate" "$TECH_FILE"; then
              PM_SIG=$(grep -i "PM" "$TECH_FILE" | grep -i "sign" | head -1)
              CRO_SIG=$(grep -i "CRO" "$TECH_FILE" | head -1)
              QA_SIG=$(grep -i "QA" "$TECH_FILE" | grep -i "sign\|review" | head -1)
              if [ -n "$PM_SIG" ] && [ -n "$CRO_SIG" ] && [ -n "$QA_SIG" ]; then
                echo "  [Tech Gate 2] Signatures: PM=present, CRO=present, QA=present"
              else
                echo "  [Tech Gate 2] WARNING: Missing required signatures"
              fi
            else
              echo "  [Tech Gate 2] No Gate block found - document may not be ready for merge"
              exit 1
            fi
          fi

          # Check QA Case Design Gate
          QA_FILE=$(ls docs/qa/QA-${ISSUE}_*.md 2>/dev/null | head -1)
          if [ -n "$QA_FILE" ]; then
            echo ""
            echo "[QA Case Design Gate] Checking: $QA_FILE"
            if grep -q "Gate\|Sign" "$QA_FILE"; then
              PM_SIG=$(grep -i "PM" "$QA_FILE" | grep -i "sign" | head -1)
              CTO_SIG=$(grep -i "CTO" "$QA_FILE" | head -1)
              ENG_SIG=$(grep -i "Engineer\|ENG" "$QA_FILE" | grep -i "sign\|review" | head -1)
              if [ -n "$PM_SIG" ] && [ -n "$CTO_SIG" ] && [ -n "$ENG_SIG" ]; then
                echo "  [QA Case Design Gate] Signatures: PM=present, CTO=present, Engineer=present"
              else
                echo "  [QA Case Design Gate] WARNING: Missing required signatures"
              fi
            fi
          fi

          echo ""
          echo "[Gate Check] All Gate blocks validated"

      - name: Report success
        run: |
          echo ""
          echo "=========================================="
          echo "Doc PR Checks PASSED"
          echo "=========================================="
          echo "Issue: #${{ steps.extract-issue.outputs.issue_number }}"
          echo "PR: ${{ github.event.pull_request.title }}"
          echo ""
          echo "All required documents present:"
          echo "  - PRD: docs/prd/PRD-${{ steps.extract-issue.outputs.issue_number }}_*.md"
          echo "  - Tech: docs/tech/Tech-${{ steps.extract-issue.outputs.issue_number }}_*.md"
          echo "  - QA: docs/qa/QA-${{ steps.extract-issue.outputs.issue_number }}_*.md"
          echo ""
          echo "Gate Status:"
          echo "  - PRD Gate 1: PM + CTO + CSO/CRO"
          echo "  - Tech Gate 2: PM + CRO + QA"
          echo "  - QA Case Design Gate: PM + CTO + Engineer"
